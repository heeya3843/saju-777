<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대만신(大萬神) 프리미엄 사주 리포트 v5</title>
<style>

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#ede9e1;color:#1a1a2e;line-height:1.6}
/* ── COVER ── */
#pg-intro{min-height:100vh;background:linear-gradient(155deg,#0d0620 0%,#1a0a3d 55%,#0d1a3d 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
.logo-wrap{width:70px;height:70px;margin-bottom:20px}
.logo-wrap svg{width:100%;height:100%}
.intro-brand{color:rgba(201,168,76,.5);font-size:11px;letter-spacing:5px;margin-bottom:18px}
.intro-main-title{font-size:32px;color:#f0d080;letter-spacing:6px;margin-bottom:6px;text-align:center}
.intro-sub{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:3px;margin-bottom:30px}
.form-card{background:rgba(255,255,255,.07);border:1px solid rgba(201,168,76,.25);border-radius:18px;padding:28px 24px;width:100%;max-width:500px}
.form-card h2{color:#f0d080;font-size:15px;text-align:center;letter-spacing:2px;margin-bottom:18px}
.cal-toggle{display:flex;border:1px solid rgba(201,168,76,.3);border-radius:8px;overflow:hidden;margin-bottom:14px}
.cal-btn{flex:1;padding:10px;text-align:center;cursor:pointer;color:rgba(255,255,255,.45);font-size:13px;background:transparent;border:none;font-family:inherit;transition:all .2s}
.cal-btn.active{background:rgba(201,168,76,.2);color:#f0d080;font-weight:700}
.fgroup{margin-bottom:12px}
.fgroup label{display:block;color:rgba(255,255,255,.55);font-size:11px;margin-bottom:5px;letter-spacing:.5px}
.finput,.fselect{width:100%;padding:9px 12px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:8px;color:#fff;font-size:13px;outline:none;font-family:inherit}
.finput:focus,.fselect:focus{border-color:#c9a84c}
.finput::placeholder{color:rgba(255,255,255,.25)}
.fselect option{background:#1a0a3d}
.date-row{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}
.leap-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.leap-row input{width:15px;height:15px;accent-color:#c9a84c}
.leap-row label{color:rgba(255,255,255,.55);font-size:12px;cursor:pointer}
.gender-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.gbtn{padding:10px;border:1px solid rgba(255,255,255,.18);border-radius:8px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);cursor:pointer;text-align:center;font-size:13px;transition:all .2s;user-select:none}
.gbtn.selected{border-color:#c9a84c;background:rgba(201,168,76,.18);color:#f0d080;font-weight:700}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#c9a84c,#a07030);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:2px;font-family:inherit;margin-top:12px}
/* ── LOADING ── */
#pg-loading{display:none;min-height:100vh;background:linear-gradient(155deg,#0d0620,#1a0a3d);flex-direction:column;align-items:center;justify-content:center}
.spinner{width:48px;height:48px;border:3px solid rgba(201,168,76,.2);border-top-color:#c9a84c;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:24px}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{color:#f0d080;font-size:16px;margin-bottom:20px;letter-spacing:2px}
.step-list{list-style:none;width:280px}
.step-item{padding:8px 0;color:rgba(255,255,255,.3);font-size:12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.05)}
.step-item::before{content:"○";font-size:14px;min-width:18px}
.step-item.done{color:rgba(255,255,255,.8)}.step-item.done::before{content:"✓";color:#c9a84c}
/* ── REPORT ── */
#pg-report{display:none;background:#ede9e1;min-height:100vh}
.report-wrap{max-width:860px;margin:0 auto;padding:20px 16px}
/* toolbar */
.report-toolbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.tbtn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;border:none;transition:all .2s}
.tbtn-back{background:rgba(26,10,61,.1);border:1px solid rgba(26,10,61,.2)!important;color:#1a0a3d}
.tbtn-pdf{background:linear-gradient(135deg,#c0392b,#96281b);color:#fff}
.tbtn-share{background:linear-gradient(135deg,#1a6b3c,#0f4025);color:#fff}
.tbtn-copy{background:linear-gradient(135deg,#1a3a6b,#0f2040);color:#fff}
.tbtn:hover{opacity:.85;transform:translateY(-1px)}
/* COVER 카드 */
.r-cover{background:linear-gradient(155deg,#0d0620,#1a0a3d 60%,#0d1a3d);border-radius:20px;padding:48px 36px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
.r-cover::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 60% 30%,rgba(201,168,76,.07),transparent 65%);pointer-events:none}
.r-cover-brand{color:rgba(201,168,76,.5);font-size:10px;letter-spacing:5px;margin-bottom:20px}
.r-cover-diamond{font-size:52px;display:block;margin-bottom:12px}
.r-cover-title{font-size:14px;color:rgba(255,255,255,.4);letter-spacing:4px;margin-bottom:24px}
.r-cover-name{font-size:48px;font-weight:300;color:#f0d080;letter-spacing:8px;margin-bottom:6px}
.r-cover-info{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:20px}
.r-cover-tags{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px}
.r-ctag{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:5px 14px;color:#f0d080;font-size:11px}
.r-cover-quote{color:rgba(255,255,255,.7);font-size:14px;line-height:2.2;max-width:500px;margin:0 auto 16px;font-style:italic}
.r-cover-quote-author{color:rgba(255,255,255,.3);font-size:11px}
/* STEP 카드 */
.step-card{background:#fff;border-radius:18px;padding:28px 24px;margin-bottom:18px;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.step-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px;padding-bottom:16px;border-bottom:2px solid #f0ebe0}
.step-badge{min-width:48px;height:48px;background:linear-gradient(135deg,#1a0a3d,#2d1b69);color:#f0d080;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;letter-spacing:1px;flex-direction:column}
.step-badge span{font-size:7px;opacity:.7;letter-spacing:2px}
.step-title{font-size:19px;font-weight:700;color:#1a0a3d;margin-bottom:4px}
.step-desc{font-size:12px;color:#888}
/* 사주팔자 테이블 */
.saju-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}
.saju-table th,.saju-table td{border:1px solid #e8e0d0;padding:11px 10px;text-align:center;vertical-align:middle}
.saju-table thead th{background:linear-gradient(135deg,#1a0a3d,#2d1b69);color:#f0d080;font-size:11px;letter-spacing:1px}
.saju-table tbody tr:nth-child(even){background:#faf8f4}
.saju-table .row-label{background:#f5f0e8;font-weight:600;font-size:11px;color:#666;text-align:left;padding-left:14px}
.stem-big{font-size:28px;font-weight:700;line-height:1.2}
.branch-big{font-size:24px;font-weight:600;line-height:1.2}
.star-pill{display:inline-block;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:600}
.t12-pill{font-size:11px;color:#666}
/* 오행 바 */
.el-section{margin:16px 0}
.el-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.el-name{width:24px;font-size:12px;font-weight:700;color:#555}
.el-emoji{width:22px;font-size:15px}
.el-track{flex:1;height:28px;background:#f0ebe0;border-radius:6px;overflow:hidden}
.el-fill{height:100%;border-radius:6px;display:flex;align-items:center;padding-left:10px;color:#fff;font-size:12px;font-weight:700;transition:width .8s}
.el-count{width:28px;text-align:right;font-size:14px;font-weight:700;color:#1a0a3d}
.summary-box{background:linear-gradient(135deg,#f8f5ee,#f0ebe0);border:1px solid #e0d8c0;border-radius:10px;padding:14px 16px;margin-top:12px;font-size:13px;line-height:1.8}
.summary-box strong{color:#1a0a3d}
/* 일간 카드 */
.trait-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}
.trait-card{background:#f8f6f2;border:1px solid #e8e0d0;border-radius:12px;padding:16px;text-align:center}
.trait-card .tc-icon{font-size:26px;margin-bottom:8px}
.trait-card .tc-title{font-size:12px;font-weight:700;color:#888;margin-bottom:6px}
.trait-card .tc-body{font-size:13px;color:#333;line-height:1.7}
/* 신강/신약 카드 */
.ss-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:12px 0}
.ss-card{border-radius:10px;padding:14px 16px}
.ss-card.pos{background:#e8f5e9;border:1px solid #a5d6a7}
.ss-card.neg{background:#fde8e8;border:1px solid #f5a0a0}
.ss-card h4{font-size:12px;font-weight:700;margin-bottom:8px}
.ss-card.pos h4{color:#1b5e20}
.ss-card.neg h4{color:#7f0000}
.ss-card li{font-size:12px;line-height:1.8;color:#333;margin-left:14px}
/* 체크리스트 (STEP 03) */
.checklist-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.check-item{border-radius:12px;padding:16px;border:2px solid transparent}
.check-item.ci-yes{background:#eefbf3;border-color:#52c97a}
.check-item.ci-wait{background:#fffbec;border-color:#f5c842}
.check-item.ci-no{background:#fff2f2;border-color:#f07070}
.ci-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ci-indicator{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ci-yes .ci-indicator{background:#52c97a}
.ci-wait .ci-indicator{background:#f5c842}
.ci-no .ci-indicator{background:#f07070}
.ci-label{font-size:13px;font-weight:700;color:#1a1a2e}
.ci-verdict{font-size:11px;font-weight:700;border-radius:20px;padding:2px 10px;display:inline-block;margin-bottom:6px}
.ci-yes .ci-verdict{background:#52c97a;color:#fff}
.ci-wait .ci-verdict{background:#f5c842;color:#333}
.ci-no .ci-verdict{background:#f07070;color:#fff}
.ci-reason{font-size:12px;color:#555;line-height:1.7}
/* 힘이 되는 말 */
.daemansin-quote{background:linear-gradient(135deg,#1a0a3d,#2d1b69);border-radius:12px;padding:20px 22px;margin-top:18px}
.daemansin-quote blockquote{font-size:13.5px;line-height:2.2;color:rgba(255,255,255,.88);font-style:italic}
.daemansin-quote .qa-author{font-size:11px;color:#c9a84c;margin-top:10px}
/* 타임라인 */
.tl-wrap{display:flex;flex-direction:column;gap:0}
.tl-row{display:flex;gap:14px;align-items:stretch}
.tl-left{display:flex;flex-direction:column;align-items:center;width:14px}
.tl-dot{width:14px;height:14px;border-radius:50%;background:#ddd;flex-shrink:0;margin-top:4px}
.tl-dot.cur{background:#c9a84c;box-shadow:0 0 12px rgba(201,168,76,.5)}
.tl-line{width:2px;background:#e8e0d0;flex:1;margin:3px auto}
.tl-body{flex:1;background:#faf8f4;border:1px solid #e8e0d0;border-radius:10px;padding:12px 14px;margin-bottom:10px}
.tl-body.cur{background:linear-gradient(135deg,#1a0a3d,#2d1b69);color:#fff;border-color:#c9a84c}
.tl-period{font-size:11px;color:#888;margin-bottom:3px}
.tl-body.cur .tl-period{color:rgba(255,255,255,.5)}
.tl-ganji{font-size:22px;font-weight:700;color:#1a0a3d;margin-bottom:2px}
.tl-body.cur .tl-ganji{color:#f0d080}
.tl-theme{font-size:12px;color:#555;line-height:1.6}
.tl-body.cur .tl-theme{color:rgba(255,255,255,.75)}
/* 월운 그리드 */
.month-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
.month-card{background:#faf8f4;border:1px solid #e8e0d0;border-radius:10px;padding:12px}
.month-card.mc-cur{background:linear-gradient(135deg,#1a0a3d,#2d1b69);border-color:#c9a84c;color:#fff}
.mc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.mc-num{font-size:11px;color:#aaa}
.mc-card.mc-cur .mc-num{color:rgba(255,255,255,.5)}
.mc-ganji{font-size:14px;font-weight:700;color:#1a0a3d}
.month-card.mc-cur .mc-ganji{color:#f0d080}
.mc-score-bar{height:5px;background:#f0ebe0;border-radius:3px;margin-top:6px;overflow:hidden}
.mc-score-fill{height:100%;border-radius:3px}
.mc-desc{font-size:11px;color:#666;margin-top:5px;line-height:1.6}
.month-card.mc-cur .mc-desc{color:rgba(255,255,255,.7)}
/* 점성술 */
.ast-hero{background:linear-gradient(135deg,#0a1a3d,#162d6b);border-radius:14px;padding:24px;display:flex;align-items:center;gap:20px;margin-bottom:14px;flex-wrap:wrap}
.ast-sign-big{font-size:64px;flex-shrink:0}
.ast-info h3{color:#7ec8e3;font-size:20px;font-weight:700;margin-bottom:4px}
.ast-info p{color:rgba(255,255,255,.7);font-size:13px;line-height:1.7}
.ast-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.ast-tag{background:rgba(126,200,227,.15);border:1px solid rgba(126,200,227,.3);border-radius:20px;padding:3px 10px;color:#7ec8e3;font-size:11px}
.ast-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}
.ast-card-item{background:#0a1a3d;border-radius:10px;padding:14px}
.ast-card-item h4{color:#7ec8e3;font-size:12px;margin-bottom:6px}
.ast-card-item p{color:rgba(255,255,255,.75);font-size:12px;line-height:1.7}
/* 수비학 */
.numo-hero{background:linear-gradient(135deg,#1a0a3d,#2d1b69);border-radius:14px;padding:22px;display:flex;align-items:center;gap:18px;margin-bottom:14px;flex-wrap:wrap}
.numo-num-big{font-size:64px;font-weight:900;line-height:1;flex-shrink:0}
.numo-info h3{color:#f0d080;font-size:18px;font-weight:700;margin-bottom:4px}
.numo-info p{color:rgba(255,255,255,.75);font-size:13px;line-height:1.7}
.numo-cycle{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.nc-item{text-align:center;padding:8px 10px;border-radius:8px;min-width:54px;background:rgba(255,255,255,.06);color:rgba(255,255,255,.6)}
.nc-item.cur{background:rgba(201,168,76,.25);color:#f0d080;font-weight:700}
.nc-year{font-size:10px}
.nc-num{font-size:20px;font-weight:700}
/* 신살 */
.ssal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-top:10px}
.ssal-card{background:#faf8f4;border:2px solid #e8e0d0;border-radius:10px;padding:14px;text-align:center}
.ssal-card.has{border-color:#c9a84c;background:rgba(201,168,76,.07)}
.ssal-card.has-strong{border-color:#e74c3c;background:rgba(231,76,60,.05)}
.ssal-name{font-size:13px;font-weight:700;color:#1a0a3d;margin-bottom:6px}
.ssal-icon{font-size:24px;margin:4px 0}
.ssal-where{font-size:11px;color:#888;margin-bottom:4px}
.ssal-meaning{font-size:11px;color:#555;line-height:1.6}
/* 정보 테이블 */
.info-table{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0}
.info-table th{background:#f5f0e8;padding:9px 12px;text-align:left;border:1px solid #e0d8cc;font-size:11px;color:#666;width:35%}
.info-table td{padding:9px 12px;border:1px solid #e0d8cc}
/* 종합 메시지 */
.final-letter{background:linear-gradient(155deg,#0d0620,#1a0a3d,#0d1a3d);border-radius:16px;padding:32px;color:rgba(255,255,255,.9);font-size:14px;line-height:2.4;margin-bottom:14px}
.final-letter strong{color:#f0d080}
.final-letter .letter-name{font-size:20px;color:#f0d080;font-weight:700;display:block;margin-bottom:16px}
.action-list{counter-reset:actions}
.action-item{display:flex;gap:14px;align-items:flex-start;padding:12px;background:#faf8f4;border-radius:10px;border:1px solid #e8e0d0;margin-bottom:8px}
.action-num{min-width:28px;height:28px;background:linear-gradient(135deg,#1a0a3d,#2d1b69);color:#f0d080;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.action-text{font-size:13px;color:#333;line-height:1.7}
/* 공유 모달 */
#share-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;align-items:center;justify-content:center}
#share-modal.open{display:flex}
.share-box{background:#fff;border-radius:16px;padding:28px;width:320px;text-align:center}
.share-box h3{font-size:16px;font-weight:700;color:#1a0a3d;margin-bottom:6px}
.share-box p{font-size:12px;color:#666;margin-bottom:18px}
.share-options{display:flex;flex-direction:column;gap:8px}
.share-opt{padding:12px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:600;border:none;font-family:inherit}
.sopt-html{background:linear-gradient(135deg,#1a0a3d,#2d1b69);color:#f0d080}
.sopt-txt{background:linear-gradient(135deg,#1a3a1a,#2d6a2d);color:#fff}
.sopt-close{background:#f0ebe0;color:#555;margin-top:4px}
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:#1a0a3d;color:#f0d080;padding:10px 22px;border-radius:28px;font-size:13px;opacity:0;transition:all .3s;z-index:10000;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media print{#pg-intro,#pg-loading,#share-modal,#toast,.report-toolbar{display:none!important}#pg-report{display:block!important}.step-card{break-inside:avoid;box-shadow:none;border:1px solid #e0d8cc}.r-cover,.tl-body.cur,.daemansin-quote,.final-letter{-webkit-print-color-adjust:exact;print-color-adjust:exact}@page{margin:12mm;size:A4}}
@media(max-width:600px){.trait-grid,.ss-grid,.checklist-grid,.ast-cards,.month-grid{grid-template-columns:1fr}.r-cover-name{font-size:36px}}

</style>
</head>
<body>

<!-- 입력 폼 -->
<div id="pg-intro">
  <div class="logo-wrap">
    <svg viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
      <polygon points="35,2 68,20 68,50 35,68 2,50 2,20" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
      <text x="35" y="42" text-anchor="middle" font-size="22" fill="#f0d080">💎</text>
    </svg>
  </div>
  <div class="intro-brand">DAEMANSIN · PREMIUM SAJU REPORT</div>
  <div class="intro-main-title">대만신(大萬神)</div>
  <div class="intro-sub">프리미엄 종합 사주 리포트 · 완전판 13단계</div>
  <div class="form-card">
    <h2>✦ 사주팔자 종합 분석 ✦</h2>
    <div class="cal-toggle">
      <button class="cal-btn active" id="btn-solar">☀️ 양력 (서력)</button>
      <button class="cal-btn" id="btn-lunar">🌙 음력 (陰曆)</button>
    </div>
    <div class="fgroup">
      <label>이름</label>
      <input class="finput" id="f-name" type="text" placeholder="성함을 입력하세요">
    </div>
    <div class="fgroup">
      <label id="lbl-date">생년월일 (양력)</label>
      <div class="date-row">
        <input class="finput" id="f-year" type="number" placeholder="년도 (예: 1988)" min="1930" max="2010">
        <input class="finput" id="f-month" type="number" placeholder="월" min="1" max="12">
        <input class="finput" id="f-day" type="number" placeholder="일" min="1" max="30">
      </div>
    </div>
    <div class="leap-row" id="leap-row" style="display:none">
      <input type="checkbox" id="f-leap">

// ================================================
//  이벤트 리스너 (CSP 대응 — inline onclick 대신 addEventListener 사용)
// ================================================
function attachEventListeners() {
  // 양력/음력 토글
  var btnSolar = document.getElementById('btn-solar');
  var btnLunar = document.getElementById('btn-lunar');
  if(btnSolar) btnSolar.addEventListener('click', function(){ selectCal('solar'); });
  if(btnLunar) btnLunar.addEventListener('click', function(){ selectCal('lunar'); });

  // 성별 버튼
  var btnM = document.getElementById('gbtn-M');
  var btnF = document.getElementById('gbtn-F');
  if(btnM) btnM.addEventListener('click', function(){ selectGender('M'); });
  if(btnF) btnF.addEventListener('click', function(){ selectGender('F'); });

  // 분석 시작 버튼
  var submitBtn = document.getElementById('submit-btn-main');
  if(submitBtn) submitBtn.addEventListener('click', startReport);

  // 뒤로가기 버튼
  var backBtn = document.getElementById('back-btn-main');
  if(backBtn) backBtn.addEventListener('click', goBack);

  // PDF 저장 버튼
  var pdfBtn = document.getElementById('pdf-btn-main');
  if(pdfBtn) pdfBtn.addEventListener('click', savePDF);

  // 공유하기 버튼
  var shareBtn = document.getElementById('share-btn-main');
  if(shareBtn) shareBtn.addEventListener('click', openShareModal);

  // 요약 복사 버튼
  var copyBtn = document.getElementById('copy-btn-main');
  if(copyBtn) copyBtn.addEventListener('click', copySummary);

  // 모달 내부 버튼들
  var soptHtml = document.getElementById('sopt-html');
  var soptTxt  = document.getElementById('sopt-txt');
  var soptClose= document.getElementById('sopt-close');
  if(soptHtml)  soptHtml.addEventListener('click', downloadReportHTML);
  if(soptTxt)   soptTxt.addEventListener('click',  function(){ closeShareModal(); copySummary(); });
  if(soptClose) soptClose.addEventListener('click', closeShareModal);

  // 모달 외부 클릭 시 닫기
  var modal = document.getElementById('share-modal');
  if(modal) modal.addEventListener('click', function(e){ if(e.target === modal) closeShareModal(); });
}

if(document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', attachEventListeners);
} else {
  attachEventListeners();
}

function lunarToSolar(ly, lm, ld, isLeap) {
  var data = LUNAR_DATA[String(ly)];
  if (!data) return null;
  var start = data.start;
  var months = data.months;
  var leapMonth = data.leap;
  var days = 0;
  var idx = 0;
  for (var m = 1; m < lm; m++) {
    days += months[idx++];
    if (leapMonth === m) { days += months[idx++]; }
  }
  if (isLeap && leapMonth === lm) { days += months[idx++]; }
  days += ld - 1;
  var d = new Date(start[0], start[1]-1, start[2]);
  d.setDate(d.getDate() + days);
  return [d.getFullYear(), d.getMonth()+1, d.getDate()];
}

var JIEQI = [[2,4,0],[3,6,1],[4,5,2],[5,6,3],[6,6,4],[7,7,5],[8,7,6],[9,8,7],[10,8,8],[11,7,9],[12,7,10]];

// ================================================
//  사주 계산
// ================================================
function getSajuMonthIdx(month, day) {
  if (month === 1) return (day < 6) ? 10 : 11;
  var idx = 11;
  for (var i = 0; i < JIEQI.length; i++) {
    var jm = JIEQI[i][0], jd = JIEQI[i][1], ji = JIEQI[i][2];
    if (month > jm || (month === jm && day >= jd)) idx = ji;
  }
  return idx;
}

function getYearPillar(year, month, day) {
  var y = year;
  if (month < 2 || (month === 2 && day < 4)) y--;
  return { stem: STEMS[(y-4+400)%10], branch: BRANCHES[(y-4+480)%12] };
}

function getMonthPillar(year, month, day) {
  var y = year;
  if (month < 2 || (month === 2 && day < 4)) y--;
  var yi = (y-4+400)%10;
  var smi = getSajuMonthIdx(month, day);
  var startStem = ((yi%5)*2+2)%10;
  return { stem: STEMS[(startStem+smi)%10], branch: BRANCHES[(2+smi)%12] };
}

function getDayPillar(year, month, day) {
  var y = year, m = month;
  if (m <= 2) { y--; m += 12; }
  var A = Math.floor(y/100), B = 2-A+Math.floor(A/4);
  var JD = Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+day+B-1524;
  var off = JD - 2415021;
  return { stem: STEMS[((off%10)+10)%10], branch: BRANCHES[(off%12+10)%12] };
}

function getHourPillar(dayStem, hour) {
  if (hour < 0) return null;
  var hb = (hour === 23) ? 0 : Math.floor((hour+1)/2);
  var bi = hb%12;
  var di = STEMS.indexOf(dayStem);
  var starts = [0,2,4,6,8,0,2,4,6,8];
  return { stem: STEMS[(starts[di]+bi)%10], branch: BRANCHES[bi] };
}

function getTenStar(ds, os) {
  var di = STEMS.indexOf(ds), oi = STEMS.indexOf(os);
  var de = S_ELEM[di], oe = S_ELEM[oi];
  var same = (di%2) === (oi%2);
  if (de===oe) return same ? '비견' : '겁재';
  if (EL_GEN[de]===oe) return same ? '식신' : '상관';
  if (EL_CTR[de]===oe) return same ? '편재' : '정재';
  if (EL_GEN[oe]===de) return same ? '편인' : '정인';
  if (EL_CTR[oe]===de) return same ? '편관' : '정관';
  return '';
}

function getTwelveStage(ds, br) {
  var bi = BRANCHES.indexOf(br);
  return (T12[ds] || [])[bi] || '-';
}

function calcElements(pillars) {
  var c = { 목:0, 화:0, 토:0, 금:0, 수:0 };
  pillars.forEach(function(p) {
    if (!p) return;
    c[S_ELEM[STEMS.indexOf(p.stem)]] += 2;
    c[B_ELEM[BRANCHES.indexOf(p.branch)]] += 2;
    (HIDDEN[p.branch]||[]).forEach(function(h){ c[S_ELEM[STEMS.indexOf(h)]] += 1; });
  });
  return c;
}

function getStrength(de, pillars) {
  var sup=0, tot=0;
  pillars.forEach(function(p) {
    if (!p) return;
    var se=S_ELEM[STEMS.indexOf(p.stem)], be=B_ELEM[BRANCHES.indexOf(p.branch)];
    if (se===de || EL_GEN_R[de]===se) sup+=2;
    if (be===de || EL_GEN_R[de]===be) sup+=2;
    tot+=4;
  });
  return (sup*2>=tot) ? '신강(身强)' : '신약(身弱)';
}

// 공망
function getGongmang(stemIdx, branchIdx) {
  var diff = ((branchIdx-stemIdx)+12)%12;
  return [(diff+10)%12, (diff+11)%12];
}

// 도화/역마/화개 그룹 조회
function getSsalGroup(br) {
  var g1=['인','오','술'], g2=['신','자','진'], g3=['사','유','축'], g4=['해','묘','미'];
  if (g1.indexOf(br)>=0) return 'g1';
  if (g2.indexOf(br)>=0) return 'g2';
  if (g3.indexOf(br)>=0) return 'g3';
  if (g4.indexOf(br)>=0) return 'g4';
  return null;
}
var DOHWA_MAP = { g1:'묘', g2:'유', g3:'오', g4:'자' };
var YEOKMA_MAP = { g1:'신', g2:'인', g3:'해', g4:'사' };
var HWAGAE_MAP = { g1:'술', g2:'진', g3:'축', g4:'미' };

function calcSsal(pillars, ds) {
  var yearBr = pillars[0] ? pillars[0].branch : null;
  var dayBr  = pillars[2] ? pillars[2].branch : null;
  var monthBr= pillars[1] ? pillars[1].branch : null;
  var hourBr = pillars[3] ? pillars[3].branch : null;
  var allBr  = [yearBr, monthBr, dayBr, hourBr].filter(Boolean);

  // 도화살 (년지, 일지 기준)
  var dohwa_yr = yearBr ? DOHWA_MAP[getSsalGroup(yearBr)] : null;
  var dohwa_dy = dayBr  ? DOHWA_MAP[getSsalGroup(dayBr)]  : null;
  var dohwaWhere = [];
  allBr.forEach(function(b){ if(b===dohwa_yr||b===dohwa_dy) dohwaWhere.push(b); });

  // 역마살 (년지, 일지 기준)
  var yeokma_yr = yearBr ? YEOKMA_MAP[getSsalGroup(yearBr)] : null;
  var yeokma_dy = dayBr  ? YEOKMA_MAP[getSsalGroup(dayBr)]  : null;
  var yeokmaWhere = [];
  allBr.forEach(function(b){ if(b===yeokma_yr||b===yeokma_dy) yeokmaWhere.push(b); });

  // 화개살 (년지, 일지 기준)
  var hwagae_yr = yearBr ? HWAGAE_MAP[getSsalGroup(yearBr)] : null;
  var hwagae_dy = dayBr  ? HWAGAE_MAP[getSsalGroup(dayBr)]  : null;
  var hwagaeWhere = [];
  allBr.forEach(function(b){ if(b===hwagae_yr||b===hwagae_dy) hwagaeWhere.push(b); });

  // 양인살
  var yangin = YANGIN_MAP[ds];
  var yanginWhere = allBr.filter(function(b){ return b===yangin; });

  // 공망 (일주 기준)
  var gm = [], gmBr = [];
  if (pillars[2]) {
    var si = STEMS.indexOf(ds), bi = BRANCHES.indexOf(dayBr);
    var gm_idx = getGongmang(si, bi);
    gmBr = [BRANCHES[gm_idx[0]], BRANCHES[gm_idx[1]]];
    allBr.forEach(function(b){ if(gmBr.indexOf(b)>=0) gm.push(b); });
  }

  // 화(火)살: 사오미 과다 (화 오행 4개 이상)
  var fireCount = allBr.filter(function(b){ return ['사','오','미'].indexOf(b)>=0; }).length;

  return {
    dohwa:{ val: dohwa_yr||dohwa_dy, where: dohwaWhere },
    yeokma:{ val: yeokma_yr||yeokma_dy, where: yeokmaWhere },
    hwagae:{ val: hwagae_yr||hwagae_dy, where: hwagaeWhere },
    yangin:{ val: yangin, where: yanginWhere },
    gongmang:{ val: gmBr, where: gm },
    fire: fireCount >= 3
  };
}

function analyzeRelations(pillars) {

    STEM_CHUNG.forEach(function(pair){
      if((stems[i]===pair[0]&&stems[j]===pair[1])||(stems[i]===pair[1]&&stems[j]===pair[0]))
        res.stemChung.push({a:stems[i],b:stems[j]});
    });
  }

  // 지지 관계
  for(var i=0;i<branches.length;i++) for(var j=i+1;j<branches.length;j++) {
    if(!branches[i]||!branches[j]) continue;
    var ba=branches[i], bb=branches[j];
    BRANCH_YUKH.forEach(function(pair){
      if((ba===pair[0]&&bb===pair[1])||(ba===pair[1]&&bb===pair[0])){
        var k=pair[0]+pair[1]; res.yukHap.push({a:ba,b:bb,result:BRANCH_YUKH_RESULT[k]||''});
      }
    });
    BRANCH_CHUNG.forEach(function(pair){
      if((ba===pair[0]&&bb===pair[1])||(ba===pair[1]&&bb===pair[0]))
        res.branchChung.push({a:ba,b:bb});
    });
    BRANCH_PA.forEach(function(pair){
      if((ba===pair[0]&&bb===pair[1])||(ba===pair[1]&&bb===pair[0]))
        res.pa.push({a:ba,b:bb});
    });
    BRANCH_HAE.forEach(function(pair){
      if((ba===pair[0]&&bb===pair[1])||(ba===pair[1]&&bb===pair[0]))
        res.hae.push({a:ba,b:bb});
    });
  }

  // 삼합 (3개 조합)
  BRANCH_SAM.forEach(function(trio){
    var found=trio.slice(0,3).filter(function(b){ return branches.indexOf(b)>=0; });
    if(found.length>=2) res.samHap.push({members:found,full:found.length===3,result:trio[3]});
  });

  // 방합 (3개 조합)
  BRANCH_BANG.forEach(function(trio){
    var found=trio.slice(0,3).filter(function(b){ return branches.indexOf(b)>=0; });
    if(found.length>=2) res.bangHap.push({members:found,full:found.length===3,result:trio[3]});
  });

  // 형
  BRANCH_HYUNG.forEach(function(group){
    var found=group.filter(function(b){ return branches.indexOf(b)>=0; });
    if(found.length>=2) res.hyung.push({members:found});
  });

  return res;
}

function getDaeunStartAge(y,m,d,gender,yearStem) {
  var yangYear=STEMS.indexOf(yearStem)%2===0;
  var fwd=(yangYear&&gender==='M')||(!yangYear&&gender==='F');
  var jieqiDays=[6,4,6,5,6,6,7,7,8,8,7,7];
  var daysInMonth=[31,28,31,30,31,30,31,31,30,31,30,31];
  var curJd=jieqiDays[m-1];
  var days;
  if(fwd) {
    days=(d<curJd)?(curJd-d):(daysInMonth[m-1]-d+jieqiDays[m%12]);
  } else {
    days=(d>=curJd)?(d-curJd):(daysInMonth[(m-2+12)%12]-jieqiDays[(m-2+12)%12]+d);
  }
  return { age:Math.max(1,Math.round(days/3)), fwd:fwd };
}

function calcDaeun(yp,mp,gender,y,m,d) {
  var da=getDaeunStartAge(y,m,d,gender,yp.stem);
  var msi=STEMS.indexOf(mp.stem), mbi=BRANCHES.indexOf(mp.branch);
  var list=[];
  for(var i=0;i<9;i++) {
    var si=da.fwd?(msi+i+1)%10:((msi-i-1+100)%10);
    var bi=da.fwd?(mbi+i+1)%12:((mbi-i-1+120)%12);
    list.push({age:da.age+i*10, end:da.age+(i+1)*10-1, stem:STEMS[si], branch:BRANCHES[bi]});
  }
  return {list:list, startAge:da.age, fwd:da.fwd};
}

function getYearFortune(y) {
  return {stem:STEMS[(y-4+400)%10], branch:BRANCHES[(y-4+480)%12]};
}

function getMonthFortune(monthPillar, n) {
  var msi=STEMS.indexOf(monthPillar.stem), mbi=BRANCHES.indexOf(monthPillar.branch);
  return {stem:STEMS[(msi+n)%10], branch:BRANCHES[(mbi+n)%12]};
}

function digitSum(n) {
  var s = String(Math.abs(parseInt(n)||0));
  var sum = 0;
  for(var i=0;i<s.length;i++) sum += parseInt(s[i])||0;
  if(sum===11||sum===22||sum===33) return sum;
  if(sum>9) return digitSum(sum);
  return sum;
}
function getLifePath(y,m,d) {
  var yDigits=String(y).split('').reduce(function(a,c){return a+(parseInt(c)||0);},0);
  var total = digitSum(yDigits) + digitSum(m) + digitSum(d);
  if(total===11||total===22||total===33) return total;
  return digitSum(total);
}
function getPersonalYear(m,d,cy) {
  var total = digitSum(m) + digitSum(d) + digitSum(cy);
  if(total===11||total===22||total===33) return total;
  return digitSum(total);
}
function getNameNum(name) {
  if(!name) return 5;
  var clean = name.replace(/\s/g,'');
  return digitSum(clean.length * 7 + clean.charCodeAt(0)) || 5;
}

function attachEventListeners(){
  var btnSolar=document.getElementById('btn-solar');
  var btnLunar=document.getElementById('btn-lunar');
  if(btnSolar)btnSolar.addEventListener('click',function(){selectCal('solar');});
  if(btnLunar)btnLunar.addEventListener('click',function(){selectCal('lunar');});
  var btnM=document.getElementById('gbtn-M');
  var btnF=document.getElementById('gbtn-F');
  if(btnM)btnM.addEventListener('click',function(){selectGender('M');});
  if(btnF)btnF.addEventListener('click',function(){selectGender('F');});
  var submitBtn=document.getElementById('submit-btn-main');
  if(submitBtn)submitBtn.addEventListener('click',startReport);
  var backBtn=document.getElementById('back-btn-main');
  if(backBtn)backBtn.addEventListener('click',goBack);
  var pdfBtn=document.getElementById('pdf-btn-main');
  if(pdfBtn)pdfBtn.addEventListener('click',function(){showToast('🖨 인쇄 창에서 PDF로 저장을 선택하세요');setTimeout(function(){window.print();},400);});
  var shareBtn=document.getElementById('share-btn-main');
  if(shareBtn)shareBtn.addEventListener('click',function(){document.getElementById('share-modal').classList.add('open');});
  var copyBtn=document.getElementById('copy-btn-main');
  if(copyBtn)copyBtn.addEventListener('click',copySummary);
  var soptHtml=document.getElementById('sopt-html');
  var soptTxt=document.getElementById('sopt-txt');
  var soptClose=document.getElementById('sopt-close');
  if(soptHtml)soptHtml.addEventListener('click',downloadReportHTML);
  if(soptTxt)soptTxt.addEventListener('click',function(){document.getElementById('share-modal').classList.remove('open');copySummary();});
  if(soptClose)soptClose.addEventListener('click',function(){document.getElementById('share-modal').classList.remove('open');});
  var modal=document.getElementById('share-modal');
  if(modal)modal.addEventListener('click',function(e){if(e.target===modal)modal.classList.remove('open');});
}
if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',attachEventListeners);}else{attachEventListeners();}

function selectCal(mode){
  calMode=mode;
  document.getElementById('btn-solar').className='cal-btn'+(mode==='solar'?' active':'');
  document.getElementById('btn-lunar').className='cal-btn'+(mode==='lunar'?' active':'');
  document.getElementById('lbl-date').textContent=mode==='solar'?'생년월일 (양력)':'생년월일 (음력)';
  document.getElementById('leap-row').style.display=mode==='lunar'?'flex':'none';
}

async function startReport(){
  var name=document.getElementById('f-name').value.trim();
  var yearIn=parseInt(document.getElementById('f-year').value)||0;
  var monthIn=parseInt(document.getElementById('f-month').value)||0;
  var dayIn=parseInt(document.getElementById('f-day').value)||0;
  var hour=parseInt(document.getElementById('f-hour').value);
  var city=document.getElementById('f-city').value;
  var isLeap=document.getElementById('f-leap').checked;
  if(!name){alert('이름을 입력해 주세요.');return;}
  if(yearIn<1930||yearIn>2010){alert('생년은 1930~2010 사이로 입력해 주세요.');return;}
  if(monthIn<1||monthIn>12){alert('월은 1~12 사이로 입력해 주세요.');return;}
  if(dayIn<1||dayIn>30){alert('일은 1~30 사이로 입력해 주세요.');return;}
  if(!selectedGender){alert('성별을 선택해 주세요.');return;}
  var year=yearIn,month=monthIn,day=dayIn;
  var isLunarInput=(calMode==='lunar');
  var lunarYMD=null;
  if(isLunarInput){
    var solar=lunarToSolar(yearIn,monthIn,dayIn,isLeap);
    if(!solar){alert('해당 음력 날짜를 변환할 수 없습니다.');return;}
    lunarYMD=[yearIn,monthIn,dayIn,isLeap];
    year=solar[0];month=solar[1];day=solar[2];
  }
  currentInput={name,gender:selectedGender,year,month,day,hour,city,isLunarInput,lunarYMD,origYear:yearIn,origMonth:monthIn,origDay:dayIn};
  document.getElementById('pg-intro').style.display='none';
  document.getElementById('pg-report').style.display='none';
  var lp=document.getElementById('pg-loading');
  lp.style.display='flex';
  for(var i=1;i<=7;i++)document.getElementById('step'+i).className='step-item';
  await delay(300);markStep(1);
  await delay(400);markStep(2);
  await delay(400);markStep(3);
  await delay(400);markStep(4);
  await delay(400);markStep(5);
  await delay(300);markStep(6);
  await delay(300);markStep(7);
  await delay(200);
  lp.style.display='none';
  buildReport(name,selectedGender,year,month,day,hour,city,lunarYMD);
  document.getElementById('pg-report').style.display='block';
  window.scrollTo(0,0);
}

  txt+='이름: '+inp.name+' ('+(inp.gender==='M'?'남성':'여성')+')\n';
  txt+='생년월일: '+inp.year+'년 '+inp.month+'월 '+inp.day+'일\n\n';
  txt+='📌 사주팔자\n  년주: '+yp.stem+yp.branch+'  월주: '+mp.stem+mp.branch+'  일주: '+dp.stem+dp.branch+(inp.hour>=0?'  시주: '+hp.stem+hp.branch:'')+' \n';
  txt+='🌟 태양궁: '+sunSign.k+' ('+sunSign.e+')\n';
  txt+='🔢 생명경로수: '+lifePath+'\n';
  txt+='━━━━━━━━━━━━\n대만신 사주 연구원';
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){showToast('📋 요약이 복사되었습니다!');}).catch(function(){fallbackCopy(txt);});
  }else{fallbackCopy(txt);}
}
function fallbackCopy(txt){
  var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');showToast('📋 복사되었습니다!');}catch(e){showToast('❌ 복사 실패');}
  document.body.removeChild(ta);
}
var _toastTimer=null;
function showToast(msg){
  var t=document.getElementById('toast');if(!t)return;
  t.textContent=msg;t.classList.add('show');
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){t.classList.remove('show');},2600);
}

</script>
</body>
